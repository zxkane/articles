{{- with site.Params.adsense }}
<script>
  (function () {
    var loaded = false;
    function load() {
      if (loaded) return;
      loaded = true;
      var s = document.createElement('script');
      s.async = true;
      s.crossOrigin = 'anonymous';
      s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ .publisher }}';
      document.head.appendChild(s);
    }
    var events = ['scroll', 'mousemove', 'touchstart', 'keydown', 'pointerdown'];
    var opts = { once: true, passive: true, capture: true };
    function onInteract() {
      load();
      events.forEach(function (ev) { window.removeEventListener(ev, onInteract, opts); });
    }
    function start() {
      events.forEach(function (ev) { window.addEventListener(ev, onInteract, opts); });
      // Fallback: load after 8s if no interaction (ad revenue vs perf tradeoff)
      setTimeout(load, 8000);
    }
    if (document.readyState === 'complete') start();
    else window.addEventListener('load', start);
  })();
</script>
{{- end }}
