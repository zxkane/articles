<script type="module">
  const CDN = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  function markFailed(err) {
    console.error('[mermaid] unavailable:', err);
    document.querySelectorAll('.mermaid, pre.mermaid').forEach(el => {
      el.classList.add('mermaid-failed');
    });
  }

  function theme() {
    return document.body && document.body.classList.contains('dark') ? 'dark' : 'default';
  }

  import(CDN).then(({ default: mermaid }) => {
    function render() {
      mermaid.initialize({ startOnLoad: false, theme: theme() });
      mermaid.run({ querySelector: '.mermaid, pre.mermaid' })
        .catch(err => console.error('[mermaid] render failed:', err));
    }
    render();
    document.addEventListener('themeChanged', () => {
      document.querySelectorAll('.mermaid, pre.mermaid').forEach(el => {
        const src = el.getAttribute('data-source');
        if (src) {
          el.removeAttribute('data-processed');
          el.textContent = src;
        }
      });
      render();
    });
  }).catch(markFailed);
</script>
