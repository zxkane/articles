<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs">
<script type="module">
  const CDN = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  function markFailed(err) {
    console.error('[mermaid] unavailable:', err);
    document.querySelectorAll('.mermaid, pre.mermaid').forEach(el => {
      el.classList.add('mermaid-failed');
    });
  }

  function theme() {
    return document.body && document.body.classList.contains('dark') ? 'dark' : 'default';
  }

  let loaded = null;
  function loadMermaid() {
    if (!loaded) loaded = import(CDN);
    return loaded;
  }

  async function render() {
    try {
      const { default: mermaid } = await loadMermaid();
      mermaid.initialize({ startOnLoad: false, theme: theme() });
      await mermaid.run({ querySelector: '.mermaid, pre.mermaid' });
    } catch (err) {
      markFailed(err);
    }
  }

  function scheduleRender() {
    if (!('IntersectionObserver' in window)) { render(); return; }
    const io = new IntersectionObserver((entries, obs) => {
      for (const e of entries) {
        if (e.isIntersecting) {
          obs.disconnect();
          render();
          return;
        }
      }
    }, { rootMargin: '400px' });
    document.querySelectorAll('.mermaid, pre.mermaid').forEach(el => io.observe(el));
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', scheduleRender);
  } else {
    scheduleRender();
  }

  document.addEventListener('themeChanged', async () => {
    document.querySelectorAll('.mermaid, pre.mermaid').forEach(el => {
      const src = el.getAttribute('data-source');
      if (src) {
        el.removeAttribute('data-processed');
        el.textContent = src;
      }
    });
    render();
  });
</script>
