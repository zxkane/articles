<div class="post_comments" id="comments-container">
  <script>
    (function () {
      const slot = document.currentScript.parentNode;
      const attrs = {
        'data-repo': 'zxkane/articles',
        'data-repo-id': 'MDEwOlJlcG9zaXRvcnkxNjM1OTcwMjc=',
        'data-category': 'General',
        'data-category-id': 'DIC_kwDOCcBK484CSKCb',
        'data-mapping': 'pathname',
        'data-strict': '0',
        'data-reactions-enabled': '1',
        'data-emit-metadata': '0',
        'data-input-position': 'bottom',
        'data-theme': 'preferred_color_scheme',
        'data-lang': 'en'
      };
      let loaded = false;
      function load() {
        if (loaded) return;
        loaded = true;
        const s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.crossOrigin = 'anonymous';
        s.async = true;
        for (const [k, v] of Object.entries(attrs)) s.setAttribute(k, v);
        slot.appendChild(s);
      }
      if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver(function (entries) {
          for (const e of entries) {
            if (e.isIntersecting) { io.disconnect(); load(); return; }
          }
        }, { rootMargin: '800px' });
        io.observe(slot);
      } else {
        window.addEventListener('load', load);
      }
    })();
  </script>
</div>
